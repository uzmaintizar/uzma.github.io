<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Mobile Website</title>
<style>
body{
font-family: Arial, sans-serif;
margin:0;
padding:0;
background:#f5f5f5;
}
header{
background:#2c3e50;
color:white;
padding:20px;
text-align:center;
}
.container{
padding:20px;
}
.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
button{
background:#3498db;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
}
@media(max-width:600px){
header{font-size:18px;}
}
</style>
</head>
<body>

<header>
<h1>Welcome</h1>
<p>This is a simple mobile-friendly website</p>
</header>

<div class="container">

<div class="card">
<h2>About Me</h2>
<p>I am learning web development and this is my first responsive website.</p>
</div>

<div class="card">
<h2>Services</h2>
<p>Basic website design, CV website, and portfolio creation.</p>
</div>

<div class="card">
<h2>Contact</h2>
<p>Email: example@gmail.com</p>
<button>Contact Me</button>
</div>

</div>

</body>
</html>
